name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (editable)
        run: pip install -e .

      - name: Smoke test — CLI
        run: |
          seth --version
          seth available | head -5

      - name: Build .pyz
        run: make pyz

      - name: Smoke test — pyz
        run: |
          ./dist/seth.pyz --version
          ./dist/seth.pyz available | head -5
